crds:
  enabled: true

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: platform-alerts
      group_by:
        - namespace
        - alertname
        - severity
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - alertname="Watchdog"
        - receiver: "null"
          matchers:
            - severity="info"
        - receiver: petclinic-alerts
          matchers:
            - alertname=~"Petclinic.*"
          group_by:
            - namespace
            - alertname
            - pod
            - deployment
            - severity
          group_wait: 30s
          group_interval: 2m
          repeat_interval: 1h
    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity=~"warning|info"
        equal:
          - namespace
          - alertname
      - source_matchers:
          - severity="warning"
        target_matchers:
          - severity="info"
        equal:
          - namespace
          - alertname
      - source_matchers:
          - alertname="InfoInhibitor"
        target_matchers:
          - severity="info"
        equal:
          - namespace
      - target_matchers:
          - alertname="InfoInhibitor"
    receivers:
      - name: "null"
      - name: platform-alerts
      - name: petclinic-alerts
    templates:
      - /etc/alertmanager/config/*.tmpl

grafana:
  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    retention: 10d
    podMonitorSelectorNilUsesHelmValues: false
